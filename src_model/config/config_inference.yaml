hydra:
  run:
    dir: output/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

model:
  vocab_size: 50304
  block_size: 2048
  n_embd: 2048
  n_layers: 24
  n_heads: 16
  head_size: 128
  rope_head_size: 64

inference:
  checkpoint: src_model/checkpoint/best_val.pt
  device: cuda
  max_new_tokens: 256
  topk: 15
  temperature: 0.7
  repetition_penalty: 1.3
